<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBO 배당률표</title>
<style>
  :root{
    --bg:#0b0f1a; --card:#131a2b; --card2:#0e1422;
    --gold:#f5b942; --blue:#3b82f6; --red:#ef4444; --gray:#8b95a8;
    --line:rgba(255,255,255,0.06);
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg); color:#e7ebf3; font-family:-apple-system,'Noto Sans KR',sans-serif;
    margin:0; padding:0 0 40px;
  }
  header{
    padding:10px 20px 8px; text-align:center; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#151d30,#0b0f1a);
  }
  header h1{ font-size:18px; margin:0 0 2px; color:var(--gold); letter-spacing:0.5px; }
  header p{ margin:0; font-size:10px; color:var(--gray); }
  .legend{
    display:flex; justify-content:center; gap:12px; font-size:10px; color:var(--gray);
    padding:5px 10px; flex-wrap:wrap;
  }
  .legend b{ font-weight:800; }
  .legend .b{ color:var(--blue); }
  .legend .r{ color:var(--red); }

  .nav{
    display:flex; align-items:center; justify-content:space-between;
    max-width:480px; margin:0 auto; padding:0 16px;
  }
  .nav button{
    background:var(--card); border:1px solid var(--line); color:var(--gold);
    font-size:16px; width:32px; height:32px; border-radius:10px; cursor:pointer;
  }
  .nav button:active{ transform:scale(0.94); }
  .nav .date{ font-size:15px; font-weight:800; color:#fff; }
  .nav .idx{ font-size:9px; color:var(--gray); text-align:center; margin-top:0; }

  .day{ max-width:480px; margin:0 auto; padding:4px 14px 0; }

  .game{
    background:var(--card); border-radius:12px; margin-bottom:5px;
    border:1px solid var(--line); overflow:hidden;
  }
  .game .badge-row{
    display:flex; justify-content:flex-end; padding:3px 10px 0;
  }
  .badge{
    font-size:9px; font-weight:800; padding:1px 8px; border-radius:20px;
  }
  .badge.jeong{ background:rgba(59,130,246,0.15); color:var(--blue); }
  .badge.yeok{ background:rgba(239,68,68,0.15); color:var(--red); }
  .badge.neu{ background:rgba(139,149,168,0.15); color:var(--gray); }
  .badge.pending{ background:rgba(245,166,35,0.15); color:var(--gold); }

  .matchup{
    display:flex; align-items:stretch; padding:2px 8px 6px; gap:6px;
  }
  .team{
    flex:1; text-align:center; padding:5px 6px; border-radius:9px;
    background:var(--card2); border:2px solid transparent;
  }
  .team.winner{
    border-color:var(--blue); background:rgba(59,130,246,0.08);
    box-shadow:0 0 0 1px rgba(59,130,246,0.25) inset;
  }
  .team .name{ font-size:14px; font-weight:900; margin-bottom:1px; }
  .team.winner .name{ color:var(--blue); }
  .team .odds{ font-size:18px; font-weight:900; color:#fff; line-height:1.05; }
  .team.fav .odds{ color:var(--red); }
  .team.winner.fav .odds{ color:var(--blue); }
  .team .odds-label{ font-size:8px; color:var(--gray); margin-top:0; }
  .team .crown{ font-size:9px; margin-top:1px; color:var(--blue); font-weight:800; }

  .vs{
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:var(--gray); font-weight:700; padding:0 1px;
  }

  .swipe-hint{
    text-align:center; font-size:9px; color:var(--gray); margin-top:4px;
  }
</style>
</head>
<body>
  <header>
    <h1>⚾ KBO 배당률표</h1>
    <p>Betman 프로토 승부식 기준 · 최신 날짜부터</p>
  </header>
  <div class="legend">
    <span><b class="b">■ 파랑</b> = 승리팀</span>
    <span><b class="r">■ 빨강</b> = 저배당(유리했던 쪽)</span>
  </div>

  <div class="nav">
    <button onclick="move(1)">◀</button>
    <div>
      <div class="date" id="dateLabel"></div>
      <div class="idx" id="idxLabel"></div>
    </div>
    <button onclick="move(-1)">▶</button>
  </div>

  <div class="day" id="dayContainer"></div>
  <div class="swipe-hint">◀ 이전 날짜 · 다음 날짜 ▶</div>

let cur = 0; // 0 = newest

function render(){
  const d = DAYS[cur];
  document.getElementById('dateLabel').textContent = d.date;
  document.getElementById('idxLabel').textContent = (cur+1) + ' / ' + DAYS.length;
  const c = document.getElementById('dayContainer');
  c.innerHTML = d.games.map(g => {
    const homeWin = g.winner === g.home;
    const awayWin = g.winner === g.away;
    return `
    <div class="game">
      <div class="badge-row"><span class="badge ${g.cls}">${g.label}</span></div>
      <div class="matchup">
        <div class="team ${homeWin?'winner':''} ${g.homeFav?'fav':''}">
          <div class="name">${g.home}</div>
          <div class="odds">${g.ho.toFixed(2)}</div>
          <div class="odds-label">승(홈)</div>
          ${homeWin?'<div class="crown">🏆 승리</div>':''}
        </div>
        <div class="vs">VS</div>
        <div class="team ${awayWin?'winner':''} ${g.awayFav?'fav':''}">
          <div class="name">${g.away}</div>
          <div class="odds">${g.ao.toFixed(2)}</div>
          <div class="odds-label">패(원정)</div>
          ${awayWin?'<div class="crown">🏆 승리</div>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function move(dir){
  cur = Math.max(0, Math.min(DAYS.length-1, cur+dir));
  render();
}

// swipe support
let touchX=null;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(dx > 50) move(1);
  else if(dx < -50) move(-1);
  touchX=null;
});

render();
</script>
</body>
</html>
